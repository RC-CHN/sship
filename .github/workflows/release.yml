name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Build
        run: |
          GOOS=windows GOARCH=amd64 go build -o sship.exe .
          GOOS=linux   GOARCH=amd64 go build -o sship-linux .
          GOOS=darwin  GOARCH=amd64 go build -o sship-darwin .

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            sship.exe
            sship-linux
            sship-darwin
